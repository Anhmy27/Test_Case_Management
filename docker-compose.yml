services:
  backend:
    image: tcm-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tcm-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ${TCM_ENV_FILE:-./backend/.env}
    environment:
      PORT: "5000"
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - tcm_uploads:/app/uploads
    networks:
      - tcm-network

  frontend:
    image: tcm-frontend:latest
    build:
      context: ./frontendnext
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:5000
    container_name: tcm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tcm-network

  mongodb:
    profiles: ["local-mongo"]
    image: mongo:7.0
    container_name: tcm-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: Test_Case_Management
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - tcm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u admin -p admin123 --authenticationDatabase admin || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tcm_uploads:
  mongodb_data:
  mongodb_config:

networks:
  tcm-network:
    driver: bridge
