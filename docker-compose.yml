version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: tcm-mongodb
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: test-case-management
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - tcm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27018/test -u admin -p admin123 --authenticationDatabase admin || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  mongodb_config:

networks:
  tcm-network:
    driver: bridge
